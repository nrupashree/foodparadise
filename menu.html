    <meta charset="UTF-8">
    <title>Food Menu</title>

    <style>
        html {
            scroll-behavior: smooth;
        }
        /* NAVIGATION BAR */
.nav { 
    position: fixed; 
    top: 0; 
    width: 100%; 
    background: rgba(255, 252, 252, 0); 
    display: flex; 
    justify-content: center; 
    gap: 15px; 
    padding: 12px; 
    z-index: 1000; 
} 

.nav a { 
    text-decoration: none; 
    color: white; 
    padding: 8px 14px; 
    background: #ff6b6b; 
    border-radius: 20px; 
    font-size: 14px; 
} 

.nav a:hover { 
    background: #e63946; 
} 

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #f8f9fa, #e9ecef);
            text-align: center;
        }

        /* MENU SECTION TITLE */
        .info {
            padding-top: 40px;
            font-size: 32px;
            font-weight: bold;
            color: #333;
        }

        h1 {
            margin-top: 10px;
            font-size: 40px;
            color: #333;
        }

        .menu-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            margin: 40px;
            gap: 25px;
        }

        .menu-card {
            width: 250px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            overflow: hidden;
            transition: transform 0.3s;
        }

        .menu-card:hover {
            transform: scale(1.05);
        }

        .menu-card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
        }

        .menu-content {
            padding: 15px;
        }

        .menu-content h3 {
            margin: 10px 0;
            color: #444;
        }

        .price {
            color: #e63946;
            font-size: 18px;
            font-weight: bold;
        }

        .btn {
            display: inline-block;
            margin-top: 10px;
            padding: 8px 15px;
            background: #ff6b6b;
            color: white;
            border-radius: 20px;
            text-decoration: none;
        }

        .btn:hover {
            background: #e63946;
        }
    </style>
</head>

<body>

<!-- ✅ MENU SECTION (SCROLL TARGET) -->
